name: CI/CD Pipeline
 
# ─────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual runs
 
# ─────────────────────────────────────────────
# Permissions (least-privilege)
# ─────────────────────────────────────────────
permissions:
  contents: read
  security-events: write  # Required to upload SARIF results
 
jobs:
 
  # ═══════════════════════════════════════════
  # JOB 1 – Build & Test
  # ═══════════════════════════════════════════
  build-and-test:
    name: 🐍 Build & Test
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest --tb=short --cov=. --cov-report=xml
 
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
 
  # ═══════════════════════════════════════════
  # JOB 2 – SBOM Generation (CycloneDX)
  # ═══════════════════════════════════════════
  sbom-generation:
    name: 📦 Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: build-and-test
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Install CycloneDX SBOM tool
        run: pip install cyclonedx-bom
 
      - name: Create SBOM output directory
        run: mkdir -p sbom
 
      - name: Generate SBOM (JSON format)
        run: |
          cyclonedx-py environment \
            --of JSON \
            --output-file sbom/sbom.json
          echo "✅ SBOM JSON generated at sbom/sbom.json"
 
      - name: Generate SBOM (XML format)
        run: |
          cyclonedx-py environment \
            --of XML \
            --output-file sbom/sbom.xml
          echo "✅ SBOM XML generated at sbom/sbom.xml"
 
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom/
          retention-days: 30
 
  # ═══════════════════════════════════════════
  # JOB 3 – Vulnerability Scanning (Grype)
  # ═══════════════════════════════════════════
  vulnerability-scan:
    name: 🔍 Vulnerability Scan (Grype)
    runs-on: ubuntu-latest
    needs: sbom-generation
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-files
          path: sbom/
 
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version
 
      - name: Run Grype scan – table output (human-readable)
        run: |
          grype sbom:sbom/sbom.json \
            --output table \
            --file sbom/grype-report.txt
          echo "✅ Grype table report saved to sbom/grype-report.txt"
 
      - name: Run Grype scan – JSON output (machine-readable)
        run: |
          grype sbom:sbom/sbom.json \
            --output json \
            --file sbom/grype-report.json
          echo "✅ Grype JSON report saved to sbom/grype-report.json"
 
      - name: Run Grype scan – SARIF output (GitHub Security tab)
        run: |
          grype sbom:sbom/sbom.json \
            --output sarif \
            --file sbom/grype-report.sarif
          echo "✅ Grype SARIF report saved to sbom/grype-report.sarif"
 
      - name: Upload Grype SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sbom/grype-report.sarif
          category: grype-vulnerability-scan
 
      - name: Upload all SBOM + Grype reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-and-grype-reports
          path: sbom/
          retention-days: 30
 
      - name: Print Grype summary
        if: always()
        run: |
          echo "──────────────────────────────────────"
          echo "  Grype Vulnerability Summary"
          echo "──────────────────────────────────────"
          cat sbom/grype-report.txt
